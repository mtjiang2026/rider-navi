name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    - name: Install Buildozer 1.2.0 and tools
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip wget autoconf libtool cmake
        pip install buildozer==1.2.0 cython
    - name: Download NDK r25b manually
      run: |
        mkdir -p ~/.buildozer/android/platform
        cd ~/.buildozer/android/platform
        if [ ! -d "android-ndk-r25b" ]; then
          wget -q --show-progress "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          unzip -q android-ndk-r25b-linux.zip
          rm android-ndk-r25b-linux.zip
        fi
    - name: Build APK
      run: |
        rm -f buildozer.spec
        buildozer init
        cat > buildozer.spec << 'SPECEOF'
        [app]
        title = 骑手导航
        package.name = ridernavi
        package.domain = org.test
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0
        requirements = hostpython3==3.10.14,python3==3.10.14,kivy,requests
        orientation = portrait
        fullscreen = 1
        android.permissions = INTERNET,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION
        android.api = 33
        android.minapi = 24
        android.ndk = 25b
        android.accept_sdk_license = True
        p4a.branch = master
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        SPECEOF
        
        # 在 buildozer 实际编译前，修补所有 libffi 的 configure.ac 文件
        echo "正在修补 libffi 源码中的过时宏..."
        find ~/.buildozer/android/platform/build-* -name "configure.ac" -path "*/libffi/*" | while read ac_file; do
          if grep -q "LT_SYS_SYMBOL_USCORE" "$ac_file"; then
            # 注释掉所有过时的宏调用，避免 autoreconf 报错
            sed -i 's/^AC_CANONICAL_SYSTEM/#AC_CANONICAL_SYSTEM/' "$ac_file"
            sed -i 's/^AC_PROG_LIBTOOL/#AC_PROG_LIBTOOL/' "$ac_file"
            sed -i 's/^AC_HEADER_STDC/#AC_HEADER_STDC/' "$ac_file"
            sed -i 's/^AC_TRY_COMPILE/#AC_TRY_COMPILE/' "$ac_file"
            sed -i 's/^AC_TRY_LINK/#AC_TRY_LINK/' "$ac_file"
            sed -i 's/^AC_TRY_RUN/#AC_TRY_RUN/' "$ac_file"
            sed -i 's/^AC_HELP_STRING/#AC_HELP_STRING/' "$ac_file"
            # 补充缺失的宏定义
            echo "" >> "$ac_file"
            echo "AC_DEFUN([LT_SYS_SYMBOL_USCORE], [])" >> "$ac_file"
            echo "已修补: $ac_file"
          fi
        done
        
        # 开始打包
        buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ridernavi-apk
        path: bin/*.apk
