name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Buildozer 1.2.0 and tools
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip wget autoconf libtool cmake
        pip install buildozer==1.2.0 cython
    - name: Download NDK r25b manually
      run: |
        mkdir -p ~/.buildozer/android/platform
        cd ~/.buildozer/android/platform
        if [ ! -d "android-ndk-r25b" ]; then
          wget -q --show-progress "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          unzip -q android-ndk-r25b-linux.zip
          rm android-ndk-r25b-linux.zip
        fi
    - name: Build APK
      run: |
        rm -f buildozer.spec
        buildozer init
        cat > buildozer.spec << 'SPECEOF'
        [app]
        title = 骑手导航
        package.name = ridernavi
        package.domain = org.test
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0
        requirements = hostpython3==3.10.14,python3==3.10.14,kivy,requests
        orientation = portrait
        fullscreen = 1
        android.permissions = INTERNET,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION
        android.api = 33
        android.minapi = 24
        android.ndk = 25b
        android.accept_sdk_license = True
        p4a.branch = develop
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        SPECEOF
        
        # 用 Python 精确修补所有 libffi 的 configure.ac
        python3 << 'PYEOF'
        import os, glob
        for ac in glob.glob(os.path.expanduser("~/.buildozer/android/platform/build-*/build/other_builds/libffi/*/libffi/configure.ac")):
            with open(ac, "r+") as f:
                content = f.read()
                if "LT_SYS_SYMBOL_USCORE" not in content:
                    f.write("\nAC_DEFUN([LT_SYS_SYMBOL_USCORE], [])\n")
                    print(f"Patched {ac}")
                f.seek(0)
                lines = f.readlines()
                f.seek(0)
                f.truncate()
                for line in lines:
                    if any(macro in line for macro in [
                        "AC_CANONICAL_SYSTEM", "AC_PROG_LIBTOOL",
                        "AC_HEADER_STDC", "AC_TRY_COMPILE",
                        "AC_TRY_LINK", "AC_TRY_RUN", "AC_HELP_STRING"
                    ]) and not line.startswith("#"):
                        f.write("#" + line)
                    else:
                        f.write(line)
        PYEOF
        
        buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ridernavi-apk
        path: bin/*.apk
