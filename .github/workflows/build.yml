name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    - name: Install Buildozer
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool cmake
        pip install buildozer cython
    - name: Build APK
      run: |
        rm -f buildozer.spec
        buildozer init
        cat > buildozer.spec << 'SPECEOF'
        [app]
        title = 骑手导航
        package.name = ridernavi
        package.domain = org.test
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0
        requirements = hostpython3==3.10.14,python3==3.10.14,kivy,requests
        orientation = portrait
        fullscreen = 1
        android.permissions = INTERNET,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION
        android.api = 31
        android.minapi = 24
        android.ndk = 25b
        android.accept_sdk_license = True
        p4a.branch = develop
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        SPECEOF
        buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ridernavi-apk
        path: bin/*.apk
