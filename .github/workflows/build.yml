name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    - name: Install Buildozer 1.2.0 and Cython
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip wget autoconf libtool
        pip install buildozer==1.2.0 cython
    - name: Prepare custom python-for-android (fix libffi)
      run: |
        # 克隆 master 分支
        git clone -b master --depth 1 https://github.com/kivy/python-for-android.git /home/runner/p4a-custom
        
        # 直接覆盖 libffi 配方，修复宏缺失
        cat > /home/runner/p4a-custom/pythonforandroid/recipes/libffi/__init__.py << 'RECIPEEOF'
        import os
        import sh
        from pythonforandroid.logger import shprint
        from pythonforandroid.recipe import NDKRecipe


        class LibffiRecipe(NDKRecipe):
            version = '3.4.2'
            url = 'https://github.com/libffi/libffi/archive/v{version}.tar.gz'
            name = 'libffi'

            def get_include_dirs(self, arch):
                return [os.path.join(self.get_build_dir(arch.arch), 'include')]

            def build_arch(self, arch):
                env = self.get_recipe_env(arch)
                build_dir = self.get_build_dir(arch.arch)
                configure = sh.Command(os.path.join(build_dir, 'configure'))

                # 在运行 autogen.sh 之前，修补 configure.ac 添加缺失宏
                configure_ac = os.path.join(build_dir, 'configure.ac')
                if os.path.exists(configure_ac):
                    with open(configure_ac, 'a') as f:
                        f.write('\nAC_DEFUN([LT_SYS_SYMBOL_USCORE], [])\n')
                    shprint(sh.Command('./autogen.sh'), _env=env)

                shprint(configure, '--host={}'.format(arch.command_prefix), '--prefix={}'.format(self.ctx.get_python_install_dir()), _env=env)
                shprint(sh.make, '-j4', _env=env)
                shprint(sh.make, 'install', _env=env)


        recipe = LibffiRecipe()
        RECIPEEOF
        
        # 手动下载 NDK 和 sdl2_image
        mkdir -p ~/.buildozer/android/platform
        if [ ! -d ~/.buildozer/android/platform/android-ndk-r25b ]; then
          wget -q --show-progress -O ~/.buildozer/android/platform/ndk.zip "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          cd ~/.buildozer/android/platform
          unzip -q ndk.zip
          rm ndk.zip
        fi
        mkdir -p ~/.buildozer/android/platform/build-armeabi-v7a/packages/sdl2_image
        cd ~/.buildozer/android/platform/build-armeabi-v7a/packages/sdl2_image
        if [ ! -f SDL2_image-2.8.2.tar.gz ]; then
          wget -q --show-progress -O SDL2_image-2.8.2.tar.gz "https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.tar.gz"
        fi
    - name: Build APK
      run: |
        rm -f buildozer.spec
        buildozer init
        cat > buildozer.spec << 'SPECEOF'
        [app]
        title = 骑手导航
        package.name = ridernavi
        package.domain = org.test
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0
        requirements = python3,kivy,folium,requests
        orientation = portrait
        fullscreen = 1
        android.permissions = INTERNET,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,RECORD_AUDIO
        android.api = 33
        android.minapi = 24
        android.ndk = 25b
        android.accept_sdk_license = True
        p4a.source_dir = /home/runner/p4a-custom
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        SPECEOF
        buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ridernavi-apk
        path: bin/*.apk
