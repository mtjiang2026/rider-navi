name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    - name: Install Buildozer and Cython
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip wget autoconf libtool
        pip install buildozer cython
    - name: Prepare all dependencies
      run: |
        # 1. 手动下载并放置 NDK（Buildozer 会跳过下载）
        mkdir -p ~/.buildozer/android/platform
        if [ ! -d ~/.buildozer/android/platform/android-ndk-r25b ]; then
          wget -q --show-progress -O ~/.buildozer/android/platform/ndk.zip "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          cd ~/.buildozer/android/platform
          unzip -q ndk.zip
          rm ndk.zip
        fi

        # 2. 手动下载 libffi 源码并生成 configure（跳过 autogen.sh）
        mkdir -p ~/.buildozer/android/platform/build-armeabi-v7a/build/other_builds/libffi
        cd ~/.buildozer/android/platform/build-armeabi-v7a/build/other_builds/libffi
        if [ ! -f libffi/configure ]; then
          wget -q --show-progress -O libffi.tar.gz "https://github.com/libffi/libffi/archive/v3.4.2.tar.gz"
          tar -xzf libffi.tar.gz
          mv libffi-3.4.2 libffi
          cd libffi
          # 直接运行 autoreconf 跳过出错的 autogen.sh
          autoreconf -fi
          cd ..
          rm libffi.tar.gz
        fi

        # 3. 手动下载 sdl2_image 及所有子模块（提前避免网络超时）
        mkdir -p ~/.buildozer/android/platform/build-armeabi-v7a/packages/sdl2_image
        cd ~/.buildozer/android/platform/build-armeabi-v7a/packages/sdl2_image
        if [ ! -f SDL2_image-2.8.2.tar.gz ]; then
          wget -q --show-progress -O SDL2_image-2.8.2.tar.gz "https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.tar.gz"
        fi
        # 提前解压并克隆所有子模块（这一步确保 Git 能顺利下载所有外部依赖）
        tar -xzf SDL2_image-2.8.2.tar.gz
        cd SDL2_image-2.8.2
        # 修改 .gitmodules，去掉可能出问题的 libjxl 子模块
        if [ -f .gitmodules ]; then
          sed -i '/\[submodule "external\/libjxl"\]/,/^$/d' .gitmodules
        fi
        # 强制同步所有子模块（排除 libjxl）
        git submodule update --init --recursive --depth 1
        cd ..
        rm -rf SDL2_image-2.8.2
    - name: Build APK
      run: |
        rm -f buildozer.spec
        buildozer init
        cat > buildozer.spec << 'SPECEOF'
        [app]
        title = 骑手导航
        package.name = ridernavi
        package.domain = org.test
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0
        requirements = python3,kivy,folium,requests
        orientation = portrait
        fullscreen = 1
        android.permissions = INTERNET,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,RECORD_AUDIO
        android.api = 33
        android.minapi = 24
        android.ndk = 25b
        android.accept_sdk_license = True
        p4a.branch = develop
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        SPECEOF
        buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ridernavi-apk
        path: bin/*.apk
